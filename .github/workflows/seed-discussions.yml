name: Seed Discussions

on:
  workflow_dispatch:

permissions:
  discussions: write

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Seed discussions
        env:
          GITHUB_TOKEN: ${{ secrets.VADE_DISCUSSIONS_PAT }}
        run: node scripts/seed-discussions/seed.mjs
