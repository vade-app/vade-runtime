# VADE runtime — pinned tool versions
#
# Every tool installed in the Dockerfile must be listed here with
# its exact version and a short rationale. Unpinned dependencies
# cause silent dev-env drift across contributors; this file exists
# to prevent that class of bug.
#
# Format: <tool> <version> # <rationale>
# Last updated: 2026-04-19

# Base image
node                20.19.1   # Active LTS as of April 2026. vade-core
                              # tech stack targets Node 20 LTS per
                              # vade-core/CLAUDE.md.
debian              bookworm  # Stable, recent glibc, slim variant
                              # keeps image small (~150 MB base).

# Installed by scripts/lib/common.sh into snapshot-persistent paths
# (/home/user/.local/bin on cloud, ${HOME}/.local/bin locally).
op                  2.31.0    # 1Password CLI. Required by
                              # scripts/coo-bootstrap.sh to read the
                              # COO vault. Pinned via OP_VERSION_DEFAULT
                              # in lib/common.sh.
gh                  2.91.0    # GitHub CLI. Fallback write path under
                              # vade-coo attribution when
                              # mcp__github-coo__* is degraded (see
                              # vade-app/vade-runtime#36). Same
                              # fine-grained PAT as the MCP, via
                              # $GITHUB_MCP_PAT in GH_TOKEN. Pinned via
                              # GH_VERSION_DEFAULT in lib/common.sh.
mem0-mcp-server     0.2.1     # Mem0 stdio MCP server. Required by
                              # .mcp.json for Mem0 read/write surface
                              # availability (vade-runtime#109,
                              # MEMO-2026-04-26-16). Pinned via
                              # MEM0_MCP_SERVER_VERSION_DEFAULT in
                              # lib/common.sh. Installed via `uv tool`;
                              # baked into the Dockerfile at
                              # /usr/local/bin/mem0-mcp-server in epic
                              # #112 Stream 2.
uv                  0.11.7    # Python package/tool installer. Used
                              # only as the bootstrap for
                              # mem0-mcp-server above. Pinned to the
                              # release tarball (not the install.sh
                              # pipe) so image builds are reproducible.
                              # Bump when a new mem0-mcp-server release
                              # needs a newer uv, otherwise leave alone.

# Consolidated binary vendor bundle. Single tarball published by
# .github/workflows/publish-binary-vendor.yml on this repo, containing
# op + gh + uv + mem0-mcp-server (with the uv-managed venv tree) at
# /home/user/.local/. Fetched by cloud-setup.sh's
# ensure_binaries_from_vendor in one curl with $GITHUB_MCP_PAT,
# replacing the four per-CDN fetches above. Pin format: SHA256 of the
# tarball as published; cloud-setup.sh sha256-verifies before untar.
# Without a pin the fetch path is a no-op (verification fails closed),
# leaving the per-binary direct-fetch fallback to handle install.
# Empty until the first publish-binary-vendor workflow run lands a
# bundle; bump on each Dockerfile/versions.lock change that
# regenerates the bundle.
binary_vendor_bundle  -         # SHA256 of binary-vendor.tar.gz; '-' = unset.

# Globally installed via npm
@anthropic-ai/claude-code 1.0.120  # Claude Code CLI. Pinned to the
                                   # minor available at container
                                   # bake time; rev forward when a
                                   # new feature is needed or a
                                   # security advisory lands.
tsx                 4.21.0    # TypeScript execution (esbuild-based)
                              # for running the vade-canvas MCP
                              # server. Matches vade-core devDep.

# System packages (tracked loosely; the bookworm repo pin is the
# ultimate source of truth for these). Listed for observability.
git                 debian-bookworm   # Whatever bookworm ships.
build-essential     debian-bookworm   # gcc, make, etc. for native
                                      # npm modules like `ws`.
ca-certificates     debian-bookworm   # TLS trust roots for npm.
curl                debian-bookworm   # Debugging + MCP endpoint
                                      # reachability checks.
procps              debian-bookworm   # `ps`, `top` — helpful when
                                      # dev-servers hang.
openssh-client      debian-bookworm   # `git push` over SSH for
                                      # operators who prefer it to
                                      # HTTPS+PAT.

